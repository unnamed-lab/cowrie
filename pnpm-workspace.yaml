packages:
  - "packages/*"
  - "apps/*"

allowBuilds:
  bufferutil: true
  keccak: true
  secp256k1: true
  sharp: true
  utf-8-validate: true

# Native/post-install build scripts we explicitly trust (pnpm gates these by default).
onlyBuiltDependencies:
  - bufferutil
  - keccak
  - secp256k1
  - sharp
  - utf-8-validate
  - esbuild
